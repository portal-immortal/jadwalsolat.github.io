<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IST ↔ Jakarta Time Converter</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        color: #fff;
        padding: 20px;
        box-sizing: border-box;
    }

    .card {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(14px);
        padding: 24px 20px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    h1 {
        font-size: 1.3rem;
        margin-bottom: 1rem;
        line-height: 1.2;
    }

    select, input, button {
        width: 100%;
        padding: 0.65rem;
        margin-top: 0.75rem;
        border-radius: 8px;
        border: none;
        font-size: 1rem;
        box-sizing: border-box;
    }

    button {
        background: #00c6ff;
        color: #fff;
        cursor: pointer;
        transition: background 0.25s;
    }

    button:hover {
        background: #0072ff;
    }

    .result {
        margin-top: 1.25rem;
        font-size: 1.125rem;
        font-weight: 600;
        background: rgba(255,255,255,0.1);
        padding: 10px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        transition: all 0.3s ease;
    }

    .info {
        font-size: 0.85rem;
        margin-top: 0.75rem;
        opacity: 0.8;
        line-height: 1.3;
    }
    /* clock styling */
    .clocks {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 15px;
    }
    .clock {
        flex: 1 1 100px;
        padding: 10px;
        background: rgba(255,255,255,0.15);
        border-radius: 8px;
    }
    .clock-label {
        font-size: 0.875rem;
        margin-bottom: 4px;
    }
    .clock-time {
        font-size: 1.5rem;
        font-weight: 700;
    }

    @media (max-width: 480px) {
        h1 { font-size: 1.1rem; }
        .clock-time { font-size: 1.25rem; }
    }
</style>
</head>
<body>

<div class="card">
    <h1 id="converterTitle">IST ↔ Jakarta Converter</h1>

    <!-- live clocks -->
    <div class="clocks">
        <div class="clock" id="jakartaClock">
            <div class="clock-label">Jakarta (WIB)</div>
            <div class="clock-time" id="jakartaTime">--:--:--</div>
        </div>
        <div class="clock" id="istClock">
            <div class="clock-label">India Standard Time</div>
            <div class="clock-time" id="istTime">--:--:--</div>
        </div>
        <div class="clock" id="sgtClock">
            <div class="clock-label">Singapore (SGT)</div>
            <div class="clock-time" id="sgtTime">--:--:--</div>
        </div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <select id="fromZone" onchange="updateTitle(); convertTime();">
            <option value="IST">India Standard Time (IST)</option>
            <option value="WIB">Jakarta Time (WIB)</option>
            <option value="SGT">Singapore Time (SGT)</option>
        </select>
        <select id="toZone" onchange="updateTitle(); convertTime();">
            <option value="WIB">Jakarta Time (WIB)</option>
            <option value="IST">India Standard Time (IST)</option>
            <option value="SGT">Singapore Time (SGT)</option>
        </select>
    </div>

    <input type="time" id="timeInput">

    <div class="result" id="result"></div>

    <div class="info">
        IST (UTC+5:30) | WIB (UTC+7:00) | SGT (UTC+8:00)
    </div>
</div>

<script>
const zones = {
    IST: {label: "India Standard Time (IST)", offset: 5*60+30},
    WIB: {label: "Jakarta Time (WIB)", offset: 7*60},
    SGT: {label: "Singapore Time (SGT)", offset: 8*60}
};

function convertTime() {
    const input = document.getElementById("timeInput").value;
    const from = document.getElementById("fromZone").value;
    const to = document.getElementById("toZone").value;
    const resultDiv = document.getElementById("result");

    if (!input) {
        resultDiv.innerText = "";
        return;
    }

    let [hours, minutes] = input.split(":").map(Number);
    let total = hours*60 + minutes;
    const diff = zones[to].offset - zones[from].offset;
    total = (total + diff + 24*60) % (24*60);
    const rh = Math.floor(total/60);
    const rm = total % 60;

    resultDiv.innerText =
        zones[to].label + ": " +
        String(rh).padStart(2,"0") + ":" +
        String(rm).padStart(2,"0");
}

// live clock updater
function updateClocks() {
    const now = new Date();

    // Jakarta is UTC+7
    const jakarta = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
    document.getElementById("jakartaTime").innerText = jakarta.toLocaleTimeString("en-US", {hour12: false});

    // IST is UTC+5:30 (Asia/Kolkata)
    const ist = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
    document.getElementById("istTime").innerText = ist.toLocaleTimeString("en-US", {hour12: false});

    // SGT is UTC+8 (Asia/Singapore)
    const sgt = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Singapore"}));
    document.getElementById("sgtTime").innerText = sgt.toLocaleTimeString("en-US", {hour12: false});
}

setInterval(updateClocks, 1000);
updateClocks();

// update header based on dropdown selection
function updateTitle() {
    const from = document.getElementById("fromZone").value;
    const to = document.getElementById("toZone").value;
    const title = document.getElementById("converterTitle");
    title.innerText = zones[from].label + " ➜ " + zones[to].label + " Converter";
}

// initialize title on load
updateTitle();

document.getElementById("timeInput").addEventListener('input', convertTime);
</script>

</body>
</html>
